events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==========================================
    # 1. 局域网明文访问（走 80）
    # ==========================================
    server {
        listen 80;
        server_name 192.168.0.21 localhost;

        location / {
            proxy_pass http://codex:5000;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    # ==========================================
    # 2. 外网 HTTPS 访问（走 443）
    # ==========================================
    server {
        listen 443 ssl;
        http2 on;
        server_name example.com;

        ssl_certificate     /etc/letsencrypt/example.com.pem;
        ssl_certificate_key /etc/letsencrypt/example.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 强制浏览器把所有 http 自动升级为 https（防止 mixed content）
        add_header Content-Security-Policy "upgrade-insecure-requests";

        location / {
            proxy_pass http://codex:5000;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    # ==========================================
    # 3. OpenCode 独立端口访问
    # 说明：
    # - HTTP 通过宿主机 4395 映射到容器 4395
    # - HTTPS 通过宿主机 4396 映射到容器 4396
    # - 复用 example.com 的同一套证书
    # ==========================================
    server {
        listen 4395;
        server_name example.com;

        location / {
            proxy_pass http://opencode:4096;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    server {
        listen 4396 ssl;
        http2 on;
        server_name example.com;

        ssl_certificate     /etc/letsencrypt/example.com.pem;
        ssl_certificate_key /etc/letsencrypt/example.com.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Content-Security-Policy "upgrade-insecure-requests";

        location / {
            proxy_pass http://opencode:4096;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
