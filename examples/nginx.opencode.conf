# legacy 历史参考：这是旧的子域名反代模板，仅用于历史参考。
# 它不是当前仓库根目录的正式远程部署入口配置，应优先参考根目录 nginx.conf 与 docs/remote-deploy.md。
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  listen 443 ssl http2;
  server_name opencode.example.com;

  ssl_certificate /etc/letsencrypt/opencode.example.com.pem;
  ssl_certificate_key /etc/letsencrypt/opencode.example.com.key;

  client_max_body_size 50m;

  location / {
    proxy_pass http://opencode:4096;
    proxy_http_version 1.1;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }
}
