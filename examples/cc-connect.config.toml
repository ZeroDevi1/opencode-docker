# 模板示例 / 功能示例：此文件用于初始化或参考 `/home/devuser/.cc-connect/config.toml`。
# 它不是仓库根目录正式远程部署入口；正式远程部署仍应优先参考根目录 `docker-compose.yml`、`.env.example`、`nginx.conf` 与 `docs/remote-deploy.md`。
language = "zh"

[log]
level = "info"

[[projects]]
name = "weixin"

[projects.agent]
type = "opencode"

[projects.agent.options]
cmd = "/usr/local/bin/opencode-attach"
work_dir = "/workspace/weixin"
mode = "yolo"
model = "openai/gpt-5.4"

[[projects.platforms]]
type = "weixin"

[projects.platforms.options]
# 首次扫码后，cc-connect 会把真实 token / account_id / allow_from 写回此文件。
# 建议把 allow_from 限制为你的微信用户 ID（例如 `xxx@im.wechat`），避免留空后权限边界不清。
allow_from = ""
token = ""
base_url = "https://ilinkai.weixin.qq.com"
account_id = ""
