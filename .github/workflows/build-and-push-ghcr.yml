name: build-and-push-ghcr

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - "README.md"
      - ".github/workflows/build-and-push-ghcr.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-ghcr
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Normalize image owner (lowercase)
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve upstream opencode release
        id: release
        shell: bash
        run: |
          set -euo pipefail
          opencode_ref="$(curl --fail --show-error --silent --location \
            --retry 8 \
            --retry-delay 2 \
            --retry-max-time 120 \
            --retry-all-errors \
            https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name)"
          if [ -z "${opencode_ref}" ] || [ "${opencode_ref}" = "null" ]; then
            echo "Failed to resolve latest opencode release tag" >&2
            exit 1
          fi
          echo "opencode_ref=${opencode_ref}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image tag already exists
        id: exists
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker"
          tag="${{ steps.release.outputs.opencode_ref }}"
          if docker buildx imagetools inspect "${image}:${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip scheduled build when image already exists
        if: github.event_name == 'schedule' && steps.exists.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skip build: ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker:${{ steps.release.outputs.opencode_ref }} already exists"

      - name: Build & Push
        if: github.event_name != 'schedule' || steps.exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            OPENCODE_VERSION=${{ steps.release.outputs.opencode_ref }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker:${{ steps.release.outputs.opencode_ref }}
            ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
