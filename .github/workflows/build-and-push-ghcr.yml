name: build-and-push-ghcr

on:
  schedule:
    # 每天检查一次上游 Release（GitHub schedule 使用 UTC，触发时间为 best-effort）
    # 01:17 UTC = 09:17 Asia/Shanghai
    - cron: "17 1 * * *"
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - "README.md"
      - ".github/workflows/build-and-push-ghcr.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-ghcr
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Normalize image owner (lowercase)
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve upstream opencode ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          opencode_release_tag="$(curl --fail --show-error --silent --location \
            --retry 8 \
            --retry-delay 2 \
            --retry-max-time 120 \
            --retry-all-errors \
            https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name)"
          if [ -z "${opencode_release_tag}" ] || [ "${opencode_release_tag}" = "null" ]; then
            echo "Failed to resolve latest opencode release tag" >&2
            exit 1
          fi

          opencode_package_version="${opencode_release_tag#v}"
          if [ -z "${opencode_package_version}" ]; then
            echo "Failed to normalize opencode package version from ${opencode_release_tag}" >&2
            exit 1
          fi

          echo "opencode_release_tag=${opencode_release_tag}" >> "$GITHUB_OUTPUT"
          echo "opencode_package_version=${opencode_package_version}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image tag already exists
        id: exists
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker"
          tag="${{ steps.ref.outputs.opencode_release_tag }}"
          if docker buildx imagetools inspect "${image}:${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip scheduled build when image already exists
        if: github.event_name == 'schedule' && steps.exists.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skip build: ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker:${{ steps.ref.outputs.opencode_release_tag }} already exists"

      - uses: actions/setup-node@v4
        if: github.event_name != 'schedule' || steps.exists.outputs.exists != 'true'
        with:
          node-version: 22

      - name: Validate npm package version exists
        if: github.event_name != 'schedule' || steps.exists.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          expected_version="${{ steps.ref.outputs.opencode_package_version }}"
          resolved_npm_version="$(npm view "opencode-ai@${expected_version}" version --silent)"
          if [ -z "${resolved_npm_version}" ] || [ "${resolved_npm_version}" = "null" ]; then
            echo "Failed to resolve npm package version for opencode-ai@${expected_version}" >&2
            exit 1
          fi
          if [ "${resolved_npm_version}" != "${expected_version}" ]; then
            echo "Resolved npm package version ${resolved_npm_version} does not match expected ${expected_version}" >&2
            exit 1
          fi

      - name: Build & Push
        if: github.event_name != 'schedule' || steps.exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            OPENCODE_VERSION=${{ steps.ref.outputs.opencode_package_version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker:${{ steps.ref.outputs.opencode_release_tag }}
            ghcr.io/${{ steps.owner.outputs.owner }}/opencode-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
